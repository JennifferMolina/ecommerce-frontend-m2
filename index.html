<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">

                <a class="navbar-brand" href="index.html">TecnoStore</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">Inicio</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="carrito.html">
                                Carrito <span id="contador-carrito" class="badge bg-danger">0</span>
                            </a>
                        </li>

                    </ul>
                </div>

            </div>
        </nav>
    </header>

    <main>
        <section class="container mt-4">

            <h1 class="mb-4 text-center">Productos destacados</h1>

            <div class="row g-4">

                <article class="col-12 col-md-4">
                    <div class="card h-100">
                        <img src="img/mouse.png" class="card-img-top" alt="Mouse Inalámbrico">

                        <div class="card-body">
                            <h5 class="card-title">Mouse Inalámbrico</h5>
                            <p class="card-text">$19.990</p>

                            <a href="detalle_mouse.html" class="btn btn-primary">Ver más</a>
                            <button class="btn btn-success agregar-carrito">Agregar al carrito</button>
                        </div>
                    </div>
                </article>

                <article class="col-12 col-md-4">
                    <div class="card h-100">
                        <img src="img/audifonos.png" class="card-img-top" alt="Audífonos Gamer">

                        <div class="card-body">
                            <h5 class="card-title">Audífonos Gamer</h5>
                            <p class="card-text">$29.990</p>

                            <a href="detalle_audifonos.html" class="btn btn-primary">Ver más</a>
                            <button class="btn btn-success agregar-carrito">Agregar al carrito</button>
                        </div>
                    </div>
                </article>

                <article class="col-12 col-md-4">
                    <div class="card h-100">
                        <img src="img/teclado.jpg" class="card-img-top" alt="Teclado Mecánico">

                        <div class="card-body">
                            <h5 class="card-title">Teclado Mecánico</h5>
                            <p class="card-text">$39.990</p>

                            <a href="detalle_teclado.html" class="btn btn-primary">Ver más</a>
                            <button class="btn btn-success agregar-carrito">Agregar al carrito</button>
                        </div>
                    </div>
                </article>

            </div>

        </section>
    </main>

    <footer class="bg-dark text-white text-center p-3 mt-4">
        <p class="mb-0">© 2026 TecnoStore - Todos los derechos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
